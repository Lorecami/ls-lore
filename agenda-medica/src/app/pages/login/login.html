<div class="card p-4 shadow-sm mx-auto" style="max-width: 400px;">
  <h3 class="text-center mb-4">Iniciar Sesión</h3>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="email" class="form-label">Correo electrónico</label>
      <input type="email" id="email" class="form-control" formControlName="email" />
      <div class="text-danger small" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
        <div *ngIf="loginForm.get('email')?.errors?.['required']">El correo es obligatorio.</div>
        <div *ngIf="loginForm.get('email')?.errors?.['email']">Formato de correo inválido.</div>
      </div>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Contraseña</label>
      <input type="password" id="password" class="form-control" formControlName="password" />
      <div class="text-danger small" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
        La contraseña es obligatoria.
      </div>
    </div>

    <button class="btn btn-primary w-100" type="submit" [disabled]="loginForm.invalid">Entrar</button>
  </form>
</div>
